<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOEC Digital Twin — AR</title>
<style>
  body{margin:0;background:#0b1220;color:#cbd5e1;font-family:system-ui,sans-serif;overflow:hidden;}
  #label{position:fixed;top:14px;left:14px;font-size:13px;background:rgba(0,0,0,.42);
    padding:8px 12px;border-radius:8px;max-width:60%;z-index:5;}
  #legend{position:fixed;top:14px;right:14px;font-size:11px;background:rgba(0,0,0,.45);
    padding:9px 11px;border-radius:8px;line-height:1.6;z-index:5;}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  #controls{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(0,0,0,.55);
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:5;}
  #play{background:#22c55e;border:none;color:#052e16;font-weight:700;padding:8px 14px;
    border-radius:8px;cursor:pointer;} #scrub{flex:1;min-width:140px;}
  #readout{font-size:12px;min-width:240px;} .crit{color:#ef4444;font-weight:700;}
  button.tog{background:#334155;border:none;color:#e2e8f0;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;}
  button.tog.on{background:#2563eb;}
  #arbtn{position:fixed;bottom:70px;right:16px;background:#7c3aed;border:none;color:#fff;
    font-weight:700;padding:12px 18px;border-radius:10px;cursor:pointer;font-size:15px;z-index:6;
    box-shadow:0 4px 16px rgba(124,58,237,.5);}
  #arbtn:disabled{background:#475569;box-shadow:none;}
  #arnote{position:fixed;bottom:70px;right:16px;font-size:11px;color:#94a3b8;
    background:rgba(0,0,0,.6);padding:8px 12px;border-radius:8px;max-width:220px;z-index:6;display:none;}

<button id="arbtn" disabled>checking AR…</button>
<div id="arnote"></div>

  <input type="range" id="scrub" min="0" max="0" value="0" step="1">
  <button class="tog on" id="sparseBtn">sparse {0,4,9}</button>
  <button class="tog" id="bindBtn">+ probe @2</button>
  <div id="readout">…</div>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.05, 100);
camera.position.set(3.6,1.8,4.2);
const renderer=new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(devicePixelRatio);
renderer.xr.enabled=true;                       // <-- WebXR on
document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xffffff,0.75));
const dl=new THREE.DirectionalLight(0xffffff,0.7); dl.position.set(4,6,3); scene.add(dl);

// everything lives in a group so we can scale/place it for AR (table-sized)
const world=new THREE.Group(); scene.add(world);

const N=10, layerH=0.28, gap=0.04, W=1.6, D=1.6, totalH=N*(layerH+gap);
const regions=[];
for(let i=0;i<N;i++){
  const layer=new THREE.Mesh(new THREE.BoxGeometry(W,layerH,D),
    new THREE.MeshStandardMaterial({color:0x22c55e}));
  layer.position.y=i*(layerH+gap)-totalH/2+layerH/2;
  world.add(layer); regions.push(layer);
}
const basePlate=new THREE.Mesh(new THREE.BoxGeometry(W+0.3,0.06,D+0.3),
  new THREE.MeshStandardMaterial({color:0x1e293b}));
basePlate.position.y=-totalH/2-0.05; world.add(basePlate);
function layerY(i){ return i*(layerH+gap)-totalH/2+layerH/2; }

const marker=new THREE.Mesh(new THREE.OctahedronGeometry(0.13),
  new THREE.MeshStandardMaterial({color:0x60a5fa,emissive:0x1d4ed8,emissiveIntensity:0.6}));
world.add(marker);

const SPARSE=[0,4,9], BIND=[2];
function makeProbe(region,color){
  const g=new THREE.Group();
  const puck=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.1,20),
    new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.35}));
  puck.rotation.z=Math.PI/2;
  g.add(puck); g.position.set(-W/2-0.14, layerY(region), 0); return g;
}
const sparseProbes=SPARSE.map(r=>makeProbe(r,0x94a3b8));
const bindProbes=BIND.map(r=>makeProbe(r,0x22d3ee));
sparseProbes.forEach(p=>world.add(p));
bindProbes.forEach(p=>{ p.visible=false; world.add(p); });

let showSparse=true, showBind=false;
let frames = EMBEDDED_FRAMES.slice();
const scrub=document.getElementById("scrub"), playBtn=document.getElementById("play"),
      readout=document.getElementById("readout"),
      sparseBtn=document.getElementById("sparseBtn"), bindBtn=document.getElementById("bindBtn");

function colorRel(rdb,lo,hi){ const c=new THREE.Color();
  const t=hi>lo?(rdb-lo)/(hi-lo):0.5; c.setHSL(0.33*t,0.8,0.5); return c; }
function showFrame(idx){
  const f=frames[idx], rdb=f.rdb, lo=Math.min(...rdb), hi=Math.max(...rdb);
  for(let i=0;i<N;i++) regions[i].material.color=colorRel(rdb[i],lo,hi);
  const w=f.weakest; marker.position.set(W*0.62, layerY(w), 0);
  sparseProbes.forEach(p=>p.visible=showSparse);
  bindProbes.forEach(p=>p.visible=showBind);
  const active=new Set([...(showSparse?SPARSE:[]),...(showBind?BIND:[])]);
  const covered=active.has(w), wr=rdb[w], critical=wr<0.30;
  readout.innerHTML=`seq ${f.seq} · weakest <b style="color:#93c5fd">${w}</b> (RDB ${wr.toFixed(3)}) · `+
    (covered?`<b style="color:#22d3ee">SENSED ✓</b>`:`<b style="color:#ef4444">BLIND ✗</b>`)+
    (critical?` <span class="crit">◀ CRITICAL</span>`:``);
}
function loadFrames(fr){ frames=fr; scrub.max=frames.length-1; scrub.value=0; showFrame(0); }
scrub.addEventListener("input",()=>showFrame(+scrub.value));
sparseBtn.addEventListener("click",()=>{showSparse=!showSparse;sparseBtn.classList.toggle("on",showSparse);showFrame(+scrub.value);});
bindBtn.addEventListener("click",()=>{showBind=!showBind;bindBtn.classList.toggle("on",showBind);showFrame(+scrub.value);});
let playing=false,timer=null;
playBtn.addEventListener("click",()=>{playing=!playing;playBtn.textContent=playing?"❚❚ Pause":"▶ Play";
  if(playing){timer=setInterval(()=>{let v=+scrub.value+1;if(v>+scrub.max)v=0;scrub.value=v;showFrame(v);},140);}else clearInterval(timer);});
loadFrames(frames);

// ---------- AR SETUP ----------
// desktop: normal orbit view. phone/headset with WebXR: "Enter AR" places the stack in your room.
const arbtn=document.getElementById("arbtn"), arnote=document.getElementById("arnote");
if (navigator.xr && navigator.xr.isSessionSupported) {
  navigator.xr.isSessionSupported("immersive-ar").then(supported=>{
    if (supported){
      // wire up the official ARButton but keep our own styled button as the trigger
      const real=ARButton.createButton(renderer,{requiredFeatures:[]});
      arbtn.textContent="◉ Enter AR";
      arbtn.disabled=false;
      arbtn.onclick=()=> real.click();   // delegate to the real XR entry
      // when AR starts: shrink world to table size, drop controls, place in front
      renderer.xr.addEventListener("sessionstart",()=>{
        world.scale.setScalar(0.16);           // ~table-top size
        world.position.set(0,0,-0.7);          // 0.7 m in front of you
        document.getElementById("controls").style.opacity=0.85;
      });
      renderer.xr.addEventListener("sessionend",()=>{
        world.scale.setScalar(1); world.position.set(0,0,0);
      });
    } else {
      arbtn.style.display="none";
      arnote.style.display="block";
      arnote.textContent="AR not supported on this device — showing 3D view. Open on an Android phone (Chrome) or Quest for AR.";
    }
  });
} else {
  arbtn.style.display="none";
  arnote.style.display="block";
  arnote.textContent="This browser has no WebXR — showing 3D view. For AR, open on an Android phone (Chrome) over https.";
}

// render loop (XR-aware: use setAnimationLoop so it works in AR too)
renderer.setAnimationLoop(()=>{
  controls.update();
  marker.rotation.y+=0.03;
  renderer.render(scene,camera);
});
addEventListener("resize",()=>{ camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

function parseLog(text){ const out=[]; let bad=0;
  for(const line of text.split(/\r?\n/)){ const s=line.trim(); if(!s) continue;
    try{ const o=JSON.parse(s); const r=o.rdb_hat||o.rdb;
      if(Array.isArray(r)&&r.length===N) out.push({seq:o.seq??out.length,rdb:r,weakest:o.weakest_region_hat??0});
      else bad++; }catch(e){bad++;} } return {out,bad}; }
addEventListener("dragover",e=>e.preventDefault());
addEventListener("drop",e=>{ e.preventDefault(); const f=e.dataTransfer.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ const {out}=parseLog(r.result); if(out.length) loadFrames(out); };
  r.readAsText(f); });
</script>
